name: Release

# Two modes, both triggered by push-to-main:
#
#   - Pending changesets exist  → maintain a "Version Packages" PR.
#   - No pending changesets     → publish whatever the most recent version
#                                 bump PR released to npm.
#
# The publish path is gated on typecheck + build + unit tests passing in
# this same job. CI already runs on every PR; this belt-and-braces check
# exists so a freshly-merged breakage can't escape to npm.

on:
  push:
    # Only `main` publishes to npm. `develop` is the integration branch
    # and runs CI only — never release.
    branches: [main]

concurrency: release

# Least-privilege default; the one job here genuinely needs write.
permissions:
  contents: read

jobs:
  release:
    name: Version / publish via Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Build WASM (Docker, reproducible)
        run: make -C wasm wasm-docker

      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Pre-publish verification. If any step fails, the changesets-action
      # below never runs, so a broken main can't reach npm.
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build
      - name: Unit tests
        run: pnpm -r test

      - name: Create Release PR or publish
        uses: changesets/action@dafcd08ca059722e5ab7b05b4069899018ee94c8 # v1.4.10
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
