name: Release

# Two modes, both triggered by push-to-main:
#
#   - Pending changesets exist  → maintain a "Version Packages" PR.
#   - No pending changesets     → publish whatever the most recent version
#                                 bump PR released to npm.
#
# The publish path is gated on typecheck + build + unit tests passing in
# this same job. CI already runs on every PR; this belt-and-braces check
# exists so a freshly-merged breakage can't escape to npm.

on:
  push:
    # Only `main` publishes to npm. `develop` is the integration branch
    # and runs CI only — never release.
    branches: [main]

concurrency: release

# Least-privilege default; the one job here genuinely needs write.
permissions:
  contents: read

jobs:
  release:
    name: Version / publish via Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Reuse the WASM cache ci.yml populates on push. Same key: if the
      # Go sources / Dockerfile / CRS pin haven't changed, the WASM is
      # already baked and we skip a ~3-minute Docker build on every
      # Version Packages PR and every publish.
      - name: Cache compiled coraza.wasm
        id: wasm-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/core/src/wasm/coraza.wasm
          key: wasm-${{ runner.os }}-${{ hashFiles('wasm/**/*.go', 'wasm/go.mod', 'wasm/go.sum', 'wasm/Dockerfile*', 'wasm/Makefile', 'wasm/version.txt') }}
          restore-keys: ''

      - name: Build WASM (Docker, reproducible)
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: make -C wasm wasm-docker

      # Version is read from package.json's `packageManager` field.
      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Pre-publish verification. If any step fails, the changesets-action
      # below never runs, so a broken main can't reach npm.
      # Build first: adapters' typecheck and tests import `@coraza/core`,
      # which resolves to `dist/index.d.ts` / `dist/index.js` that only
      # exist after tsup has run.
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Unit tests
        run: pnpm -r test

      - name: Create Release PR or publish
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
