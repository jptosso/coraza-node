name: Release

# Two modes, both triggered by push-to-main:
#
#   - Pending changesets exist  → maintain a "Version Packages" PR.
#   - No pending changesets     → publish whatever the most recent version
#                                 bump PR released to npm.
#
# The publish path is gated on typecheck + build + unit tests passing in
# this same job. CI already runs on every PR; this belt-and-braces check
# exists so a freshly-merged breakage can't escape to npm.

on:
  push:
    # Only `main` publishes to npm. `develop` is the integration branch
    # and runs CI only — never release.
    branches: [main]

concurrency: release

# Least-privilege default; the one job here genuinely needs write.
permissions:
  contents: read

jobs:
  release:
    name: Version / publish via Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Build WASM (Docker, reproducible)
        run: make -C wasm wasm-docker

      # Version is read from package.json's `packageManager` field.
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Pre-publish verification. If any step fails, the changesets-action
      # below never runs, so a broken main can't reach npm.
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build
      - name: Unit tests
        run: pnpm -r test

      - name: Create Release PR or publish
        uses: changesets/action@06245a4e0a36c064a573d4150030f5ec548e4fcc # v1.4.10
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
