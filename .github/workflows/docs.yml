name: Docs site

# Publishes docs/site/ to GitHub Pages whenever anything under docs/ changes
# on main. Static site (HTML + CSS + JS); no build step.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least-privilege default; deploy job elevates explicitly.
permissions:
  contents: read

# Only one publish in flight at a time; queue the rest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Assemble site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Assemble public/
        run: |
          set -euo pipefail
          mkdir -p public
          # Primary: the designed docs site.
          cp -r docs/site/. public/
          # Also publish the markdown docs as raw files so internal links
          # (docs/security.md, docs/performance.md, etc.) resolve when
          # visitors follow them from the static site.
          mkdir -p public/md
          for f in docs/*.md; do
            [ -f "$f" ] && cp "$f" public/md/
          done
          # Nojekyll so GitHub Pages serves files starting with underscores
          # (Next's /_next/* paths would otherwise 404 if referenced).
          touch public/.nojekyll
          ls -la public/

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: public

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
