name: Docs site

# Publishes docs/site/ to GitHub Pages whenever anything under docs/ changes
# on main. Static site (HTML + CSS + JS); no build step.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least-privilege default; deploy job elevates explicitly.
permissions:
  contents: read

# Only one publish in flight at a time; queue the rest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Assemble site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Assemble public/
        run: |
          set -euo pipefail
          mkdir -p public
          # Primary: the designed docs site.
          cp -r docs/site/. public/
          # Also publish the markdown docs as raw files so internal links
          # (docs/threat-model.md) resolve when
          # visitors follow them from the static site.
          mkdir -p public/md
          for f in docs/*.md; do
            [ -f "$f" ] && cp "$f" public/md/
          done
          # Nojekyll so GitHub Pages serves files starting with underscores
          # (Next's /_next/* paths would otherwise 404 if referenced).
          touch public/.nojekyll
          ls -la public/

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
