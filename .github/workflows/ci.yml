name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; no job here needs write.
permissions:
  contents: read

jobs:
  build-wasm:
    name: Build WASM (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build with reproducible Docker image
        run: make -C wasm wasm-docker
      - name: Upload WASM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coraza-wasm
          path: packages/core/src/wasm/coraza.wasm
          retention-days: 7

  # Selective testing: Turbo only runs tasks for packages whose inputs
  # changed since $BASE plus the packages that depend on them. So a
  # change in @coraza/core re-tests every adapter (they depend on it),
  # but a change in @coraza/express only re-tests express.
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build-wasm
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coraza-wasm
          path: packages/core/src/wasm
      # Version is read from package.json's `packageManager` field.
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Resolve change base
        id: base
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            # On push: diff against the previous tip. Zero-SHA on a brand-new
            # branch — in that case we fall back to a full run.
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "scope=full" >> "$GITHUB_OUTPUT"
            echo "No base SHA — running the full matrix."
          else
            echo "scope=affected" >> "$GITHUB_OUTPUT"
            echo "base=$base" >> "$GITHUB_OUTPUT"
            echo "Base SHA: $base"
          fi

      - name: Typecheck (affected + dependents)
        if: steps.base.outputs.scope == 'affected'
        run: pnpm turbo run typecheck --filter=...[${{ steps.base.outputs.base }}]
      - name: Build (affected + dependents)
        if: steps.base.outputs.scope == 'affected'
        run: pnpm turbo run build --filter=...[${{ steps.base.outputs.base }}]
      - name: Unit tests (affected + dependents)
        if: steps.base.outputs.scope == 'affected'
        run: pnpm turbo run test:coverage --filter=...[${{ steps.base.outputs.base }}]

      - name: Typecheck (full)
        if: steps.base.outputs.scope == 'full'
        run: pnpm -r typecheck
      - name: Build (full)
        if: steps.base.outputs.scope == 'full'
        run: pnpm -r build
      - name: Unit tests (full)
        if: steps.base.outputs.scope == 'full'
        run: pnpm -r test:coverage

      - name: Upload coverage
        if: matrix.node == '20'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E (affected adapters)
    runs-on: ubuntu-latest
    needs: build-wasm
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coraza-wasm
          path: packages/core/src/wasm
      # Version is read from package.json's `packageManager` field.
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Resolve change base
        id: base
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "scope=full" >> "$GITHUB_OUTPUT"
          else
            echo "scope=affected" >> "$GITHUB_OUTPUT"
            echo "base=$base" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        run: pnpm -r --filter "@coraza/{express,fastify,next,nestjs}" exec playwright install --with-deps chromium

      - name: Build (affected + dependents)
        if: steps.base.outputs.scope == 'affected'
        run: pnpm turbo run build --filter=...[${{ steps.base.outputs.base }}]
      - name: E2E (affected + dependents)
        if: steps.base.outputs.scope == 'affected'
        run: pnpm turbo run e2e --filter=...[${{ steps.base.outputs.base }}]

      - name: Build (full)
        if: steps.base.outputs.scope == 'full'
        run: pnpm -r build
      - name: E2E (full)
        if: steps.base.outputs.scope == 'full'
        run: pnpm -r e2e

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-reports
          path: packages/*/playwright-report
          retention-days: 14
