name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; no job here needs write.
permissions:
  contents: read

jobs:
  build-wasm:
    name: Build WASM (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Build with reproducible Docker image
        run: make -C wasm wasm-docker
      - name: Upload WASM artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coraza-wasm
          path: packages/core/src/wasm/coraza.wasm
          retention-days: 7

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build-wasm
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: coraza-wasm
          path: packages/core/src/wasm
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build
      - name: Unit + coverage
        run: pnpm -r test:coverage
      - name: Upload coverage
        if: matrix.node == '20'
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    needs: build-wasm
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        adapter: [express, fastify, next, nestjs]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: coraza-wasm
          path: packages/core/src/wasm
      - uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm -F @coraza/${{ matrix.adapter }} exec playwright install --with-deps chromium
      - name: Build
        run: pnpm -r build
      - name: E2E
        run: pnpm -F @coraza/${{ matrix.adapter }} e2e
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: playwright-report-${{ matrix.adapter }}
          path: packages/${{ matrix.adapter }}/playwright-report
          retention-days: 14
