name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default; no job here needs write.
permissions:
  contents: read

jobs:
  build-wasm:
    name: Build WASM (Docker)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Cache the finished wasm binary keyed on everything that goes into
      # building it. Ref-scoped by default, so a poisoned PR cache can't
      # leak into main. No restore-keys: a stale wasm would invisibly
      # pass unit tests but miss behaviour changes from the Go side.
      - name: Cache compiled coraza.wasm
        id: wasm-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/core/src/wasm/coraza.wasm
          key: wasm-${{ runner.os }}-${{ hashFiles('wasm/**/*.go', 'wasm/go.mod', 'wasm/go.sum', 'wasm/Dockerfile*', 'wasm/Makefile', 'wasm/version.txt') }}
          restore-keys: ''

      - name: Build with reproducible Docker image
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: make -C wasm wasm-docker

      - name: Upload WASM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coraza-wasm
          path: packages/core/src/wasm/coraza.wasm
          retention-days: 7

  # One check row per package × Node version. GitHub renders each matrix
  # leg as its own status line, so a regression in `@coraza/express` on
  # Node 24 is visible at a glance without needing to drill in.
  test:
    name: Test · ${{ matrix.package }} · Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    needs: build-wasm
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']
        package:
          - '@coraza/core'
          - '@coraza/coreruleset'
          - '@coraza/express'
          - '@coraza/fastify'
          - '@coraza/next'
          - '@coraza/nestjs'
          - '@coraza/example-shared'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coraza-wasm
          path: packages/core/src/wasm
      # Version is read from package.json's `packageManager` field.
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Cache turbo tasks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: turbo-${{ matrix.node }}-${{ matrix.package }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ matrix.node }}-${{ matrix.package }}-${{ runner.os }}-

      # Build the package + its dependencies up front. Turbo dedupes
      # across packages (topology-aware) so the typical leg only pays
      # for core + the one package it's about to test.
      - name: Build
        run: pnpm turbo run build --filter=${{ matrix.package }}...

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=${{ matrix.package }}
      - name: Unit tests + coverage
        run: pnpm turbo run test:coverage --filter=${{ matrix.package }}

      - name: Upload coverage
        if: matrix.node == '22'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          fail_ci_if_error: false
          flags: ${{ matrix.package }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Example apps get a separate, lighter job: typecheck + build (no
  # dedicated unit tests — the adapter E2Es already boot each example
  # via Playwright's webServer).
  examples:
    name: Example · ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: build-wasm
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        package:
          - '@coraza/example-express'
          - '@coraza/example-fastify'
          - '@coraza/example-nestjs'
          - '@coraza/example-next'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coraza-wasm
          path: packages/core/src/wasm
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: pnpm turbo run build --filter=${{ matrix.package }}...

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=${{ matrix.package }}

      # Only example-next has a real `build` script (next build). The
      # other three examples are run via `tsx src/server.ts` at dev time
      # and don't emit artifacts.
      - name: Build (next only)
        if: matrix.package == '@coraza/example-next'
        run: pnpm -F ${{ matrix.package }} build

  e2e:
    name: E2E · ${{ matrix.adapter }}
    runs-on: ubuntu-latest
    needs: build-wasm
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        adapter: [express, fastify, next, nestjs]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coraza-wasm
          path: packages/core/src/wasm
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Cache turbo tasks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .turbo
          key: turbo-e2e-${{ matrix.adapter }}-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-e2e-${{ matrix.adapter }}-${{ runner.os }}-

      # Playwright browsers are huge (~200 MB) and pinned to the
      # @playwright/test version. Cache keyed on that version;
      # on a cache miss the install step re-downloads.
      - name: Resolve Playwright version
        id: pw
        run: |
          v=$(pnpm -F @coraza/${{ matrix.adapter }} exec node -p "require('@playwright/test/package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm -F @coraza/${{ matrix.adapter }} exec playwright install --with-deps chromium
      - name: Install Playwright system deps only (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm -F @coraza/${{ matrix.adapter }} exec playwright install-deps chromium

      # Build the example app's full dependency graph. That's the adapter
      # + its own deps (core) AND @coraza/coreruleset, which every example
      # server imports directly but isn't a dep of the adapter package.
      - name: Build example app + deps
        run: pnpm turbo run build --filter=@coraza/example-${{ matrix.adapter }}...
      - name: E2E
        run: pnpm -F @coraza/${{ matrix.adapter }} e2e

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report-${{ matrix.adapter }}
          path: packages/${{ matrix.adapter }}/playwright-report
          retention-days: 14
