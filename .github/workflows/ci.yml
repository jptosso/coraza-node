name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wasm:
    name: Build WASM (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with reproducible Docker image
        run: make -C wasm wasm-docker
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: coraza-wasm
          path: packages/core/src/wasm/coraza.wasm
          retention-days: 7

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: build-wasm
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coraza-wasm
          path: packages/core/src/wasm
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build
      - name: Unit + coverage
        run: pnpm -r test:coverage
      - name: Upload coverage
        if: matrix.node == '20'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  e2e:
    name: E2E (${{ matrix.adapter }})
    runs-on: ubuntu-latest
    needs: build-wasm
    strategy:
      fail-fast: false
      matrix:
        adapter: [express, fastify, next, nestjs]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coraza-wasm
          path: packages/core/src/wasm
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm -F @coraza/${{ matrix.adapter }} exec playwright install --with-deps chromium
      - name: Build
        run: pnpm -r build
      - name: E2E
        run: pnpm -F @coraza/${{ matrix.adapter }} e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.adapter }}
          path: packages/${{ matrix.adapter }}/playwright-report
          retention-days: 14
