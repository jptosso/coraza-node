name: FTW (CRS regression)

on:
  push:
    branches: [main, develop]
    paths:
      - 'wasm/**'
      - 'packages/core/**'
      - 'packages/coreruleset/**'
      - 'packages/express/**'
      - 'packages/fastify/**'
      - 'packages/next/**'
      - 'packages/nestjs/**'
      - 'examples/**'
      - 'testing/ftw/**'
      - '.github/workflows/ftw.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'wasm/**'
      - 'packages/core/**'
      - 'packages/coreruleset/**'
      - 'packages/express/**'
      - 'packages/fastify/**'
      - 'packages/next/**'
      - 'packages/nestjs/**'
      - 'examples/**'
      - 'testing/ftw/**'
      - '.github/workflows/ftw.yml'
  schedule:
    # Nightly catch for CRS/engine drift — always runs the full matrix.
    - cron: '17 4 * * *'
  workflow_dispatch:

concurrency:
  group: ftw-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Pre-flight: figure out which adapter legs actually need to run.
  #
  # Rule: if any of the "shared" paths changed (core, coreruleset, wasm,
  # the ftw harness itself, the workflow), all four adapters run.
  # Otherwise run only the adapters whose own package/example directory
  # changed. Matches the selective strategy already in place for CI.
  #
  # The scheduled run and workflow_dispatch always go full-matrix.
  changes:
    name: Resolve affected adapters
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      adapters: ${{ steps.pick.outputs.adapters }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: pick
        run: |
          set -euo pipefail
          full='["express","fastify","next","nestjs"]'
          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "adapters=$full" >> "$GITHUB_OUTPUT"
            echo "Scheduled / dispatch — full matrix."
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          if [[ -z "$base" || "$base" == "0000000000000000000000000000000000000000" ]]; then
            echo "adapters=$full" >> "$GITHUB_OUTPUT"
            echo "No base SHA — running the full matrix."
            exit 0
          fi

          changed=$(git diff --name-only "$base" HEAD)
          # Any of these forces the full matrix: they're inputs every
          # adapter consumes.
          if echo "$changed" | grep -qE '^(wasm/|packages/core/|packages/coreruleset/|testing/ftw/|\.github/workflows/ftw\.yml$|examples/shared/)'; then
            echo "adapters=$full" >> "$GITHUB_OUTPUT"
            echo "Shared input changed — full matrix."
            exit 0
          fi

          picks=()
          for a in express fastify next nestjs; do
            if echo "$changed" | grep -qE "^(packages/$a/|examples/$a-app/)"; then
              picks+=("\"$a\"")
            fi
          done

          if [[ ${#picks[@]} -eq 0 ]]; then
            # Path filter matched but nothing adapter-specific — treat as
            # full matrix. Keeps the workflow self-consistent.
            echo "adapters=$full" >> "$GITHUB_OUTPUT"
            echo "Paths changed but no per-adapter match — full matrix."
          else
            joined=$(IFS=,; echo "${picks[*]}")
            echo "adapters=[$joined]" >> "$GITHUB_OUTPUT"
            echo "Affected adapters: [$joined]"
          fi

  build-wasm:
    name: Build WASM (Docker)
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Cache compiled coraza.wasm
        id: wasm-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packages/core/src/wasm/coraza.wasm
          key: wasm-${{ runner.os }}-${{ hashFiles('wasm/**/*.go', 'wasm/go.mod', 'wasm/go.sum', 'wasm/Dockerfile*', 'wasm/Makefile', 'wasm/version.txt') }}
          restore-keys: ''

      - name: Build with reproducible Docker image
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: make -C wasm wasm-docker

      - name: Upload WASM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coraza-wasm
          path: packages/core/src/wasm/coraza.wasm
          retention-days: 7

  ftw:
    name: FTW · ${{ matrix.adapter }}
    needs: [changes, build-wasm]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        adapter: ${{ fromJson(needs.changes.outputs.adapters) }}
    env:
      GO_FTW_VERSION: v2.1.1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coraza-wasm
          path: packages/core/src/wasm

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
          check-latest: true

      - run: pnpm install --frozen-lockfile

      - name: Resolve adapter settings
        id: cfg
        run: |
          case "${{ matrix.adapter }}" in
            express) echo "port=3001" >> "$GITHUB_OUTPUT"; echo "threshold=100" >> "$GITHUB_OUTPUT" ;;
            fastify) echo "port=3002" >> "$GITHUB_OUTPUT"; echo "threshold=100" >> "$GITHUB_OUTPUT" ;;
            next)    echo "port=3003" >> "$GITHUB_OUTPUT"; echo "threshold=100" >> "$GITHUB_OUTPUT" ;;
            nestjs)  echo "port=3004" >> "$GITHUB_OUTPUT"; echo "threshold=100" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Build example app + its deps
        # Topological build: pulls @coraza/core + @coraza/<adapter> +
        # @coraza/coreruleset + @coraza/example-shared in one shot.
        run: pnpm turbo run build --filter=@coraza/example-${{ matrix.adapter }}...

      - name: Run go-ftw against ${{ matrix.adapter }}
        env:
          CRS_TAG: ''
        run: |
          bash testing/ftw/run.sh \
            --adapter "${{ matrix.adapter }}" \
            --port "${{ steps.cfg.outputs.port }}" \
            --threshold "${{ steps.cfg.outputs.threshold }}"

      - name: Upload ftw artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ftw-${{ matrix.adapter }}-artifacts
          path: |
            testing/ftw/build/${{ matrix.adapter }}.stdout.log
            testing/ftw/build/${{ matrix.adapter }}.stderr.log
            testing/ftw/build/ftw-result-${{ matrix.adapter }}.json
            testing/ftw/build/ftw-stderr-${{ matrix.adapter }}.log
            testing/ftw/build/ftw-debug-${{ matrix.adapter }}.log
            testing/ftw/build/ftw-progress-${{ matrix.adapter }}.log
            testing/ftw/build/ftw-config-${{ matrix.adapter }}.yaml
            testing/ftw/build/next-build.log
          retention-days: 7
          if-no-files-found: ignore
