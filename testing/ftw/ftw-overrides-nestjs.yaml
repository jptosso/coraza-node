---
# go-ftw configuration for the NestJS adapter leg only.
#
# NestJS's CorazaGuard is a `CanActivate` — it runs pre-handler only,
# and the Nest framework gives it no post-handler hook on the response.
# That means the outbound `RESPONSE-95*-DATA-LEAKAGES-*` CRS rules can't
# fire on this adapter; the same tests that are skipped for Next's
# middleware apply here for the same architectural reason. Every other
# adapter (Express, Fastify) inspects the response stream and enforces
# these rules normally.
#
# Keep the first 24 entries of `testoverride.ignore:` in sync with
# `ftw-overrides.yaml`; `run.sh` picks this file when ADAPTER=nestjs
# and the shared file for everyone else.
#
# If a future Nest integration wraps the response (interceptor that can
# observe the streamed body, for example), delete the `[nestjs-only]`
# entries so the corpus enforces them again.

mode: cloud

testoverride:
  input:
    dest_addr: 127.0.0.1
    port: 8080

  ignore:
    # ---- [node-http] CONNECT method — see shared file for details ------
    "920100-4": "[node-http] CONNECT: Node http closes socket with no connect-handler"
    "920100-5": "[node-http] CONNECT: Node http closes socket with no connect-handler"
    "920100-6": "[node-http] CONNECT: Node http closes socket with no connect-handler"

    # ---- [apache] (shared) ---------------------------------------------
    "920100-8": "[apache] Node http accepts ':' in path; test expects Apache 400"
    "920270-4": "[apache] Rule fires (audit confirms); expected 400 is Apache-specific"
    "920290-1": "[apache] Rule fires (audit confirms); expected 400 is Apache-specific"
    "920430-5": "[node-http] Node rejects bogus Content-Length before WAF runs"
    "920430-8": "[node-http] Node http rejects HTTP/3.0 with 400; test expects 505"

    # ---- [upstream-coraza] (shared) ------------------------------------
    "921250-1": "[upstream-coraza] $Version cookie match not yet implemented upstream"
    "921250-2": "[upstream-coraza] $Version cookie match not yet implemented upstream"
    "933120-2": "[upstream-coraza] match_regex is ModSec-specific; not supported"

    # ---- [node-http] (shared) ------------------------------------------
    "920274-1": "[node-http] URI charset edge case; Node normalizes before WAF"
    "920280-3": "[node-http] Empty Host header rewritten by Node http"
    "920290-4": "[node-http] Empty Host header rewritten by Node http"
    "920430-3": "[node-http] expect_error semantics differ from Apache"
    "920430-9": "[node-http] HTTP version variant parsed differently"
    "920610-2": "[node-http] Accept-Encoding variant — rule fires on other variants"
    "920620-1": "[node-http] Content-Type charset parsing edge case"
    "922130-1": "[node-http] Multipart boundary edge case"
    "922130-2": "[node-http] Multipart boundary edge case"
    "922130-7": "[node-http] Multipart boundary edge case"

    # ---- [nestjs-only] outbound response-body rules --------------------
    # NestJS's CorazaGuard is a CanActivate; it runs before the route
    # handler and has no symmetric post-handler hook in the adapter.
    # Every CRS RESPONSE-* rule therefore has no input on NestJS and is
    # skipped here — the protection still enforces on Express and Fastify,
    # which see the response via their framework's on-response hook.
    "950100": "[nestjs-only] ASP/JSP source leak — guard is inbound-only"
    "950130": "[nestjs-only] Directory-listing leak — guard is inbound-only"
    "951100": "[nestjs-only] SQL-error leak (Microsoft) — guard is inbound-only"
    "952100": "[nestjs-only] Java error leak — guard is inbound-only"
    "953100": "[nestjs-only] PHP error leak — guard is inbound-only"
    "953110": "[nestjs-only] PHP error leak — guard is inbound-only"
    "953120": "[nestjs-only] PHP source leak — guard is inbound-only"
    "954100": "[nestjs-only] IIS error leak — guard is inbound-only"
    "955100": "[nestjs-only] Webshell output leak — guard is inbound-only"

  forcepass:
  forcefail:
