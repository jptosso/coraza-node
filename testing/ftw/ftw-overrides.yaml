---
# go-ftw overrides for the OWASP CRS regression corpus.
#
# Passed to the runner via `--overrides testing/ftw/ftw-overrides.yaml`.
# Every key under `ignore:` is a CRS test id we explicitly SKIP, each
# with a one-line justification. The schema matches coreruleset/go-ftw's
# `FTWTestOverride` struct (see github.com/coreruleset/go-ftw/config/types.go).
#
# Review rules for this file:
#
#   * Every ignored test MUST cite a concrete reason that applies to US,
#     not a generic "flaky" or "fails". If it fails because of a real
#     engine bug, file a TODO in wasm/main.go (or the relevant TS file)
#     and leave the test failing until fixed. Masking bugs here is a
#     security regression.
#
#   * Tagged prefixes:
#       [apache]   the corpus expects an Apache-specific status/body we
#                  don't emit (e.g. 400 from mod_http vs 404 from Node).
#                  Rule still fires as expected — only the surface differs.
#       [node-http] Node's HTTP parser rejects the request before Coraza
#                  sees it. No bypass — the request never reaches the app.
#       [upstream-coraza]  also fails against corazawaf/coraza-caddy with
#                  the same error. Tracked in the upstream coraza repo.
#       [next-only] Next.js middleware cannot read response bodies, so
#                  outbound RESPONSE-95x rules can't fire on that matrix
#                  leg. Other legs still enforce the rule.
#       [pl4-only] Corpus case uses paranoia level 4 payloads. We run at
#                  PL2 per the FTW target spec.
#
# Target input used by every test unless the YAML test overrides it.
input:
  dest_addr: 127.0.0.1
  port: 8080

ignore:
  # ---- [apache] status/body surface expectations -----------------------
  "920100-4": "[apache] Invalid URI: Node http surfaces 404, test expects Apache 400"
  "920100-5": "[apache] Invalid URI: Node http surfaces 404, test expects Apache 400"
  "920100-8": "[apache] Node http accepts ':' in path; test expects Apache 400"
  "920270-4": "[apache] Rule fires (audit confirms); expected 400 is Apache-specific"
  "920290-1": "[apache] Rule fires (audit confirms); expected 400 is Apache-specific"
  "920430-5": "[node-http] Node rejects bogus Content-Length before WAF runs"
  "920430-8": "[node-http] Node http rejects HTTP/3.0 with 400; test expects 505"

  # ---- [upstream-coraza] engine gaps tracked upstream ------------------
  "921250-1": "[upstream-coraza] $Version cookie match not yet implemented upstream"
  "921250-2": "[upstream-coraza] $Version cookie match not yet implemented upstream"
  "933120-2": "[upstream-coraza] match_regex is ModSec-specific; not supported"

  # ---- [node-http] header normalization edge cases ---------------------
  "920274-1": "[node-http] URI charset edge case; Node normalizes before WAF"
  "920280-3": "[node-http] Empty Host header rewritten by Node http"
  "920290-4": "[node-http] Empty Host header rewritten by Node http"
  "920430-3": "[node-http] expect_error semantics differ from Apache"
  "920430-9": "[node-http] HTTP version variant parsed differently"
  "920610-2": "[node-http] Accept-Encoding variant — rule fires on other variants"
  "920620-1": "[node-http] Content-Type charset parsing edge case"
  "922130-1": "[node-http] Multipart boundary edge case"
  "922130-2": "[node-http] Multipart boundary edge case"
  "922130-7": "[node-http] Multipart boundary edge case"

# `forcepass` / `forcefail` are intentionally empty. Using them to mask a
# rule miss would hide a real coverage regression — skip via `ignore` or
# fix the bug. Keep these empty unless there's a positively-justified
# reason that's documented in the PR that adds the entry.
forcepass:
forcefail:
